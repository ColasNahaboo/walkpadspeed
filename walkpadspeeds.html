<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>walkpadspeeds - Routine Manager</title>
    <style>
        #version:after {content: "v0.2.2";}
      
        /* Dark Mode Global Styles - Preserving Main Application Theme */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 1rem; 
            background: #121212; 
            color: #e0e0e0;
        }
        h1 { color: #ffffff; margin-bottom: 0.5rem; }
        .subtitle { color: #8e8e93; font-size: 1rem; margin-bottom: 2rem; }
        h3 { color: #b0b0b0; border-bottom: 1px solid #2d2d2d; padding-bottom: 5px; margin-top: 25px; }
        
        a {
            text-decoration: none;
            color: #aab;
            box-shadow: inset 0 -0.1em 0 0 #667;
            transition: box-shadow 0.2s ease-in-out;
            border-bottom: none;
        }
        a:hover { box-shadow: inset 0 -1.2em 0 0 #3a3a3c; color: #ffffff; }

        /* File Upload Control Area */
        .file-zone {
            max-width: 400px;
            margin: 20px auto;
            padding: 30px 20px;
            background: #1c1c1e;
            border: 2px dashed #2c2c2e;
            border-radius: 12px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .file-zone:hover {
            border-color: #0a84ff;
            background: #222224;
        }
        .file-zone p { margin: 0; color: #b0b0b0; font-size: 1rem; }
        .file-zone span { color: #0a84ff; font-weight: bold; }
        #fileInput { display: none; }

        /* Routine Row Container for Layout */
        .routine-row {
            width: 100%;
            max-width: 440px;
            margin: 12px auto;
            display: flex;
            flex-direction: column;
            background: #1c1c1e;
            border-radius: 8px;
            border: 1px solid #2c2c2e;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .routine-header-controls {
            display: flex;
            align-items: center;
            width: 100%;
        }

        /* Unified Buttons used as Playlist Links */
        .routine-link-btn { 
            flex-grow: 1;
            padding: 1.2rem 1.2rem; 
            font-size: 1.1rem; 
            font-weight: bold;
            cursor: pointer; 
            background: #0a84ff; 
            color: white;
            text-align: center;
            border: none;
            transition: background 0.2s, transform 0.1s;
        }
        .routine-link-btn:hover { background: #359aff; color: white; }
        .routine-link-btn:active { transform: scale(0.99); }

        /* Toggle Button Styles */
        .routine-toggle-btn {
            background: #2c2c2e;
            color: #0a84ff;
            border: none;
            font-size: 1.2rem;
            padding: 0 1.2rem;
            align-self: stretch;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .routine-toggle-btn:hover {
            background: #3a3a3c;
            color: #359aff;
        }
        .routine-toggle-btn.expanded {
            color: #ff9f0a;
        }

        /* Routine Meta Stats Panel Layout */
        .routine-stats {
            background: #161618;
            border-top: 1px solid #252527;
            padding: 6px 12px;
            font-size: 0.85rem;
            color: #8e8e93;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .routine-stats strong {
            color: #e0e0e0;
        }

        /* Expandable Raw Text Block Container */
        .routine-raw-view {
            display: none;
            text-align: left;
            background: #000000;
            color: #30d158;
            font-family: monospace;
            font-size: 0.9rem;
            padding: 15px;
            margin: 0;
            white-space: pre-wrap;
            border-top: 1px solid #2c2c2e;
        }

        /* Lists and Status Output Container */
        #routineList {
            margin: 25px auto;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #status { margin-top: 20px; font-weight: bold; color: #8e8e93; font-size: 0.9rem; }
        
        .error-msg { color: #ff453a !important; margin: 10px 0; font-family: monospace; }
    </style>
</head>
<body>

    <h1>walkpadspeeds</h1>
    <div class="subtitle" id="subtitleText">Routine Manager</div>

    <div class="file-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <p>Drop your routines text file here or <span>Browse</span></p>
        <input type="file" id="fileInput" accept=".txt,.txt,,*">
    </div>

    <p id="status">Status: Waiting for local configuration file...</p>

    <div id="routineContainer" style="display: none;">
        <h3>Available Routines</h3>
        <div id="routineList"></div>
    </div>

    <p id=footer><a href="https://github.com/ColasNahaboo/walkpadspeed" target="_blank" rel="noopener noreferrer">
    <svg fill="white" width="24px" height="24px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <g data-name="Layer 2">
            <rect width="24" height="24" transform="rotate(180 12 12)" opacity="0"/>
            <path d="M12 1A10.89 10.89 0 0 0 1 11.77 10.79 10.79 0 0 0 8.52 22c.55.1.75-.23.75-.52v-1.83c-3.06.65-3.71-1.44-3.71-1.44a2.86 2.86 0 0 0-1.22-1.58c-1-.66.08-.65.08-.65a2.31 2.31 0 0 1 1.68 1.11 2.37 2.37 0 0 0 3.2.89 2.33 2.33 0 0 1 .7-1.44c-2.44-.27-5-1.19-5-5.32a4.15 4.15 0 0 1 1.11-2.91 3.78 3.78 0 0 1 .11-2.84s.93-.29 3 1.1a10.68 10.68 0 0 1 5.5 0c2.1-1.39 3-1.1 3-1.1a3.78 3.78 0 0 1 .11 2.84A4.15 4.15 0 0 1 19 11.2c0 4.14-2.58 5.05-5 5.32a2.5 2.5 0 0 1 .75 2v2.95c0 .35.2.63.75.52A10.8 10.8 0 0 0 23 11.77 10.89 10.89 0 0 0 12 1" data-name="github"/>
        </g>
    </svg>
walkpadspeed</a>, ©Colas Nahaboo 2026, <span id=version></span></p>
    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const statusText = document.getElementById('status');
        const routineContainer = document.getElementById('routineContainer');
        const routineList = document.getElementById('routineList');
        
        let isTestMode = false;

        // Detect mode configuration on load
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('t') === '1') {
                isTestMode = true;
                document.getElementById('subtitleText').innerText = "Routine Link Generator (Test Mode)";
                statusText.innerText = "Status: [Test Mode] Waiting for local configuration file...";
            }
        });

        // Drag and drop events setup
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.style.borderColor = '#30d158';
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.style.borderColor = '#2c2c2e';
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length) {
                fileInput.files = files;
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            statusText.innerText = `Status: Reading "${file.name}"...`;
            const reader = new FileReader();
            
            reader.onload = (e) => {
                try {
                    parseAndGenerateLinks(e.target.result);
                } catch (err) {
                    statusText.innerHTML = `<span class="error-msg">Parser Critical Failure: ${err.message}</span>`;
                }
            };

            reader.onerror = () => {
                statusText.innerHTML = '<span class="error-msg">Error loading file from local storage.</span>';
            };

            reader.readAsText(file);
        }

        function parseAndGenerateLinks(text) {
            const blocks = text.split(/\n\s*\n/);
            const routines = [];

            for (const block of blocks) {
                const lines = block.split('\n')
                                   .map(line => line.trim())
                                   .filter(line => line.length > 0 && !line.startsWith('#'));

                if (lines.length < 2) continue;

                const routineName = lines[0];
                const stepsArray = [];
                
                let totalDuration = 0;
                let distanceAccumulator = 0; // tracking speed * time to calculate proper weighted average

                for (let i = 1; i < lines.length; i++) {
                    const stepTokens = lines[i].split(/\s+/);
                    if (stepTokens.length >= 2) {
                        const speed = parseFloat(stepTokens[0]);
                        const duration = parseInt(stepTokens[1], 10);
                        
                        if (!isNaN(speed) && !isNaN(duration)) {
                            totalDuration += duration;
                            distanceAccumulator += (speed * duration);
                        }

                        let stepLabel = stepTokens.slice(2).join('_');

                        if (stepLabel) {
                            stepsArray.push(`${stepTokens[0]}-${stepTokens[1]}-${stepLabel}`);
                        } else {
                            stepsArray.push(`${stepTokens[0]}-${stepTokens[1]}`);
                        }
                    }
                }

                if (stepsArray.length > 0) {
                    let queryParams = `n=${encodeURIComponent(routineName)}&r=${encodeURIComponent(stepsArray.join(','))}`;
                    
                    if (isTestMode) {
                        queryParams += '&t=1';
                    }

                    const blockRawText = lines.join('\n');
                    
                    // Format duration stats string
                    const mins = Math.floor(totalDuration / 60);
                    const secs = totalDuration % 60;
                    const durationStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;

                    // Calculate true time-weighted average speed
                    const avgSpeed = totalDuration > 0 ? (distanceAccumulator / totalDuration).toFixed(2) : "0.0";

                    routines.push({
                        name: routineName,
                        queryStringParams: queryParams,
                        rawText: blockRawText,
                        durationStr: durationStr,
                        avgSpeed: avgSpeed
                    });
                }
            }

            renderRoutineList(routines);
        }

        function toggleRawView(btn, targetId) {
            const viewPane = document.getElementById(targetId);
            if (viewPane.style.display === 'block') {
                viewPane.style.display = 'none';
                btn.innerText = '▼';
                btn.classList.remove('expanded');
            } else {
                viewPane.style.display = 'block';
                btn.innerText = '▲';
                btn.classList.add('expanded');
            }
        }

        function renderRoutineList(routines) {
            routineList.innerHTML = '';
            
            if (routines.length === 0) {
                statusText.innerHTML = '<span class="error-msg">No valid routines detected in file. Check formatting.</span>';
                routineContainer.style.display = 'none';
                return;
            }

            routines.forEach((routine, idx) => {
                const rowId = `raw-view-${idx}`;

                // Row block wrapper setup
                const rowContainer = document.createElement('div');
                rowContainer.className = 'routine-row';

                const controlsWrapper = document.createElement('div');
                controlsWrapper.className = 'routine-header-controls';

                // Core launch hyperlink button element
                const link = document.createElement('a');
                link.href = `./walkpadspeed.html?${routine.queryStringParams}`;
                link.className = 'routine-link-btn';
                link.innerText = routine.name;

                // Expand indicator arrow element trigger
                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'routine-toggle-btn';
                toggleBtn.innerText = '▼';
                toggleBtn.onclick = () => toggleRawView(toggleBtn, rowId);

                // Meta Stats Container Bar
                const statsDiv = document.createElement('div');
                statsDiv.className = 'routine-stats';
                statsDiv.innerHTML = `<span>Duration: <strong>${routine.durationStr}</strong></span> <span>Avg Speed: <strong>${routine.avgSpeed} km/h</strong></span>`;

                // Expanded monospaced text sheet implementation
                const rawPre = document.createElement('pre');
                rawPre.id = rowId;
                rawPre.className = 'routine-raw-view';
                rawPre.innerText = routine.rawText;

                // Bind elements down structure sequence tree
                controlsWrapper.appendChild(link);
                controlsWrapper.appendChild(toggleBtn);
                rowContainer.appendChild(controlsWrapper);
                rowContainer.appendChild(statsDiv);
                rowContainer.appendChild(rawPre);
                
                routineList.appendChild(rowContainer);
            });

            const modeLabel = isTestMode ? "[Test Mode] " : "";
            statusText.innerText = `Status: ${modeLabel}Successfully parsed ${routines.length} routine(s).`;
            routineContainer.style.display = 'block';
        }
    </script>
</body>
</html>
